<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SlotMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--g:#f0b429;--dk:#08080e;--dk2:#111118;--tx:#e8e8f0;--mu:#606070;--gr:#22c55e;}
body{background:var(--dk);color:var(--tx);font-family:'Inter',sans-serif;overflow-x:hidden;}
button,input,select,textarea{font-family:'Inter',sans-serif;}

/* NAV */
#nav{background:rgba(8,8,14,.97);border-bottom:1px solid #ffffff10;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);}
.nav-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;height:62px;gap:8px;}
.nav-jp{display:flex;flex-direction:column;justify-content:center;padding:2px 8px;cursor:default;}
.nav-jp-lbl{font-family:'Courier New',monospace;font-size:9px;color:#f0c050;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px;white-space:nowrap;}
.nav-jp-val{font-family:'Courier New',monospace;font-weight:700;font-size:clamp(15px,3.5vw,22px);color:#ffe066;text-shadow:0 0 12px #f0b429cc;white-space:nowrap;}
.nav-logo{display:flex;align-items:center;justify-content:center;cursor:pointer;}
#nlogo-txt{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,28px);color:var(--g);letter-spacing:2px;}
#nlogo-img{height:40px;max-width:160px;object-fit:contain;display:none;}
.nav-right{display:flex;justify-content:flex-end;align-items:center;gap:8px;}
.nav-socials{display:flex;gap:6px;align-items:center;}
.nav-soc-btn{width:32px;height:32px;border-radius:8px;border:1px solid #ffffff15;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;text-decoration:none;padding:0;}
.nav-soc-btn:hover{border-color:var(--g);background:#f0b42915;transform:translateY(-1px);}
.nav-soc-btn svg{width:16px;height:16px;display:block;}
.hbg{background:linear-gradient(135deg,rgba(240,180,41,.08),rgba(240,180,41,.03));border:1px solid rgba(240,180,41,.25);border-radius:10px;width:42px;height:42px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .2s;box-shadow:0 2px 12px rgba(240,180,41,.1);}
.hbg:hover{background:linear-gradient(135deg,rgba(240,180,41,.18),rgba(240,180,41,.08));border-color:rgba(240,180,41,.6);box-shadow:0 4px 18px rgba(240,180,41,.25);}
.hbg span{display:block;width:16px;height:1.5px;background:var(--g);border-radius:2px;transition:all .2s;}
.hbg:hover span{width:14px;}
.hbg:hover span:nth-child(2){width:18px;}

/* DROPDOWN */
.ndrop{position:fixed;top:70px;right:12px;background:linear-gradient(145deg,#0f0f1e,#161626);border:1px solid rgba(240,180,41,.2);border-radius:14px;padding:8px;min-width:200px;box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06);z-index:300;display:none;backdrop-filter:blur(20px);}
.ndrop.open{display:block;animation:dropIn .18s cubic-bezier(.2,.8,.3,1) forwards;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.ddi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:#9090b0;font-size:13px;font-weight:500;padding:12px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.ddi:hover{background:rgba(255,255,255,.06);color:var(--tx);}
.ddi.gold{color:var(--g);font-weight:600;}
.ddi.gold:hover{background:rgba(240,180,41,.1);}
.ddi_admin{color:#ef4444 !important;}
.ddsep{height:1px;background:rgba(255,255,255,.06);margin:4px 8px;}

/* TICKER */
#ticker{border-top:1px solid #ffffff08;border-bottom:1px solid #ffffff08;background:#0a0a14;overflow:hidden;position:relative;height:46px;}
.tk-lbl{position:absolute;left:0;top:0;bottom:0;background:#0a0a14;display:flex;align-items:center;padding:0 14px;font-size:12px;color:var(--g);letter-spacing:2px;text-transform:uppercase;border-right:1px solid #ffffff08;z-index:2;white-space:nowrap;font-weight:700;}
#tk-track{display:flex;position:absolute;top:0;bottom:0;align-items:center;padding-left:140px;will-change:transform;}
#tk-track.go{animation:tkanim 80s linear infinite;}
#tk-track.go:hover{animation-play-state:paused;}
@keyframes tkanim{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tki{display:flex;align-items:center;flex-shrink:0;cursor:pointer;border-right:1px solid #ffffff06;}
.tki-in{display:flex;align-items:center;gap:8px;padding:6px 14px;}
.tki-iw{position:relative;flex-shrink:0;}
.tki-img{width:32px;height:32px;border-radius:5px;object-fit:cover;background:#1a1a28;}
.tki-b{position:absolute;bottom:-3px;right:-5px;background:#fff;color:#111;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tki-game{font-size:11px;color:var(--tx);white-space:nowrap;}
.tki-user{font-size:9px;color:var(--mu);}
.tki-mul{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--g);white-space:nowrap;margin-left:4px;}

/* GIF */
#gif-banner{display:none;width:100%;overflow:hidden;background:#0d0d18;border-bottom:1px solid #ffffff08;}
#gif-banner img{width:100%;height:80px;object-fit:cover;display:block;}
@media(min-width:768px){#gif-banner img{height:150px;}}

/* MAIN */
#site-main{max-width:1400px;margin:0 auto;padding:14px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.eyebrow{font-size:13px;color:var(--g);letter-spacing:3px;text-transform:uppercase;font-weight:700;}
.see-all-btn{background:var(--g);color:#000;border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;}

/* SPONSOR GRID */
#sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(min-width:600px){#sp-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1000px){#sp-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));}}

/* SPONSOR CARD */
.spc{background:linear-gradient(145deg,#161622,#1d1d2e);border:1px solid #38384e;border-radius:12px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.2,.8,.3,1.2),border-color .2s,box-shadow .28s;box-shadow:0 6px 24px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);}
.spc:hover{transform:translateY(-8px) scale(1.03);border-color:var(--g);box-shadow:0 20px 50px rgba(0,0,0,.8),0 0 30px rgba(240,180,41,.2),inset 0 1px 0 rgba(255,255,255,.1);}
.spc-topbar{height:3px;width:100%;}
.ef-glow .spc-topbar{background:linear-gradient(90deg,transparent,var(--g),transparent);}
.ef-purple .spc-topbar{background:linear-gradient(90deg,transparent,#7c3aed,transparent);}
.ef-green .spc-topbar{background:linear-gradient(90deg,transparent,#22c55e,transparent);}
.ef-gradient .spc-topbar{background:linear-gradient(90deg,var(--g),#f87171,#7c3aed,var(--g));background-size:200%;animation:gmv 3s linear infinite;}
.ef-none .spc-topbar{display:none;}
@keyframes gmv{0%{background-position:0%}100%{background-position:200%}}
.spc-logo{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;background:#0d0d1a;}
.spc-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 6s ease;}
.spc:hover .spc-img{transform:scale(1.06);}
.spc-sweep{position:absolute;inset:0;background:linear-gradient(115deg,transparent 20%,rgba(255,255,255,.1) 50%,transparent 80%);transform:translateX(-130%);pointer-events:none;}
.spc:hover .spc-sweep{transform:translateX(130%);transition:transform .55s ease;}
.spc-ribbon{position:absolute;top:0;right:0;width:64px;height:64px;overflow:hidden;pointer-events:none;z-index:3;}
.spc-ribbon span{position:absolute;top:15px;right:-16px;width:72px;text-align:center;font-size:9px;font-weight:900;transform:rotate(45deg);padding:4px 0;letter-spacing:.5px;}
.rb-premium span{background:linear-gradient(90deg,#c8960f,#f0b429,#c8960f);color:#000;}
.rb-hot span{background:#ef4444;color:#fff;}
.rb-new span{background:#22c55e;color:#fff;}
.rb-vip span{background:#7c3aed;color:#fff;}
.has-hot{border-color:#ef444460!important;animation:ah 1.8s ease-in-out infinite;}
@keyframes ah{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 10px #ef444435;}50%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 30px #ef444475;}}
.has-premium{border-color:#f0b42960!important;animation:ap 2.5s ease-in-out infinite;}
@keyframes ap{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 12px #f0b42940;}50%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 35px #f0b42985;}}
.has-new{border-color:#22c55e55!important;animation:an 2s ease-in-out infinite;}
@keyframes an{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 10px #22c55e30;}50%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 28px #22c55e65;}}
.has-vip{border-color:#7c3aed60!important;animation:av 2.5s ease-in-out infinite;}
@keyframes av{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 12px #7c3aed35;}50%{box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 32px #7c3aed70;}}
.spc-body{padding:9px 10px 11px;display:flex;flex-direction:column;gap:6px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.15));}
.spc-bonus{font-size:11px;line-height:1.4;color:#c0c0d8;text-align:center;min-height:2.8em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.spc-btn{width:100%;background:var(--g);color:#000;font-size:11px;font-weight:700;padding:9px 0;border-radius:7px;border:none;cursor:pointer;transition:opacity .15s;}
.spc-btn:hover{opacity:.85;}

/* BANNER */
#sp-banner{display:none;margin-bottom:12px;border-radius:10px;overflow:hidden;}
#sp-banner img{width:100%;height:auto;max-height:200px;object-fit:cover;display:block;cursor:pointer;}

/* WINS HOME */
#wins-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
@media(min-width:600px){#wins-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1000px){#wins-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}}
.wc{background:linear-gradient(145deg,#161622,#1a1a2a);border:1px solid #35354a;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .25s,box-shadow .25s;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.wc:hover{border-color:var(--g);transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,0,0,.6),0 0 20px rgba(240,180,41,.1);}
.wc-iw{position:relative;overflow:hidden;}
.wc-img{width:100%;height:120px;object-fit:cover;display:block;}
.wc-badge{position:absolute;top:5px;right:5px;background:#fff;color:#111;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;animation:blink 1.2s ease-in-out infinite;}
.wc-body{padding:9px 11px;}
.wc-game{font-size:10px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wc-mul{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g);line-height:1.1;}
.wc-user{font-size:10px;color:var(--mu);margin-top:2px;}
.wc-play{display:inline-block;background:#ffffff08;border-radius:4px;padding:4px 8px;font-size:10px;margin-top:5px;}

/* WINS PAGE */
#wins-page{display:none;}
.wp-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(8,8,14,.96);border-bottom:1px solid #ffffff08;position:sticky;top:62px;z-index:50;backdrop-filter:blur(10px);}
.wp-back{background:#ffffff10;border:1px solid #ffffff18;color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;padding:8px 16px;border-radius:8px;}
.wp-back:hover{background:var(--g);color:#000;border-color:var(--g);}
#wp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px;}
@media(min-width:600px){#wp-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1000px){#wp-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}}
.wpc{background:linear-gradient(145deg,#161622,#1a1a2a);border:1px solid #35354a;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;}
.wpc:hover{transform:translateY(-3px);border-color:var(--g);}
.wpc-iw{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;}
.wpc-img{width:100%;height:100%;object-fit:cover;display:block;}
.wpc-badge{position:absolute;top:7px;right:7px;background:#fff;color:#111;font-family:'Bebas Neue',sans-serif;font-size:13px;padding:2px 7px;border-radius:5px;animation:blink 1.2s ease-in-out infinite;}
.wpc-sp{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.75);border:1px solid #f0b42940;color:var(--g);font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;}
.wpc-body{padding:9px 11px 11px;display:flex;flex-direction:column;gap:5px;}
.wpc-game{font-size:11px;color:var(--tx);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wpc-meta{font-size:9px;color:var(--mu);}
.wpc-mul{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g);line-height:1;margin-bottom:5px;}
.wpc-btns{display:flex;gap:5px;}
.wpc-replay{flex:1;background:#ffffff10;border:1px solid #ffffff18;color:var(--tx);border-radius:7px;padding:7px 0;font-size:10px;font-weight:600;cursor:pointer;text-align:center;}
.wpc-now{flex:1;background:var(--g);color:#000;border:none;border-radius:7px;padding:7px 0;font-size:10px;font-weight:700;cursor:pointer;text-align:center;}

/* FOOTER */
#sfoot{padding:16px;text-align:center;border-top:1px solid #ffffff08;margin-top:8px;}
.flinks{display:flex;justify-content:center;gap:14px;margin-bottom:8px;flex-wrap:wrap;}
.flinks a{color:var(--g);font-size:11px;text-decoration:none;}
#flegal{font-size:10px;color:var(--mu);}

/* FLOAT */
.fbwrap{position:fixed;bottom:16px;right:14px;z-index:150;display:flex;gap:8px;align-items:center;}
.fbtn-close{background:rgba(30,20,50,.9);color:#9090b0;border:1px solid #3a3a55;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.fbtn-close:hover{background:#ef444420;color:#f87171;border-color:#ef444450;}
.fbtn{background:var(--g);color:#000;border:none;padding:12px 20px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(240,180,41,.4);}

/* OVERLAY LAYER */
.ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(8,6,20,.88);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
@media(min-width:560px){.ov{align-items:center;}}

/* MODAL BOX */
.mbox{background:linear-gradient(145deg,#17172a,#1e1b32);border:1px solid #3a3a55;border-radius:16px 16px 0 0;width:100%;max-width:500px;padding:18px 16px 28px;max-height:90vh;overflow-y:auto;position:relative;}
@media(min-width:560px){.mbox{border-radius:16px;}}
.mcls{position:absolute;top:12px;right:14px;background:transparent;border:none;color:#7070a0;font-size:20px;cursor:pointer;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.mcls:hover{color:var(--tx);}
.mhdl{width:34px;height:3px;background:#ffffff18;border-radius:2px;margin:0 auto 14px;}
.mlogo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--g);letter-spacing:2px;text-align:center;margin-bottom:4px;}
.mttl{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;}
.mttl span{color:var(--g);}
.msub{font-size:12px;color:#7070a0;margin-bottom:16px;}
.mfg{margin-bottom:12px;}
.mfg label{display:block;font-size:10px;color:#8080a0;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.minp{width:100%;background:#1a1a28;border:1px solid #2a2a40;border-radius:8px;padding:12px;color:var(--tx);font-size:14px;outline:none;transition:border-color .15s;}
.minp:focus{border-color:var(--g);}
.minp::placeholder{color:#404060;}
.mselect{width:100%;background:#1a1a28;border:1px solid #2a2a40;border-radius:8px;padding:12px;color:var(--tx);font-size:14px;outline:none;cursor:pointer;appearance:none;}
.mbtn{width:100%;background:var(--g);border:none;color:#000;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s;}
.mbtn:hover{opacity:.88;}
.mlink{font-size:12px;color:var(--g);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;}
.mfoot{text-align:center;margin-top:14px;font-size:12px;color:#6060a0;}
.merr{display:none;background:#ef444415;border:1px solid #ef444330;border-radius:8px;padding:10px 12px;font-size:12px;color:#f87171;margin-bottom:10px;}
.msuc{display:none;text-align:center;padding:14px 0;}
.msuc-icon{font-size:40px;margin-bottom:10px;}
.msuc-ttl{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.msuc-sub{font-size:12px;color:#7070a0;margin-top:6px;line-height:1.6;}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #ffffff15;border-top-color:var(--g);border-radius:50%;animation:sp .6s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.amsgbox{background:#f0b42912;border:1px solid #f0b42930;border-radius:8px;padding:10px 13px;font-size:12px;color:#e0d0a0;margin-bottom:14px;line-height:1.6;display:none;}

/* REPLAY OVERLAY */
#rep-ov{display:none;position:fixed;inset:0;z-index:800;background:rgba(4,2,12,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:12px;}
#rep-ov.open{display:flex;}
.rep-box{background:#0d0d18;border:1px solid #f0b42928;border-radius:14px;width:100%;max-width:720px;overflow:hidden;}
.rep-fw{position:relative;width:100%;background:#000;padding-top:56.25%;}
.rep-fw iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

/* POPUP OVERLAY */
#pop-ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(8,6,22,.88);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:16px;}
#pop-ov.open{display:flex;}
.pop-box{background:linear-gradient(145deg,#18182a,#201c38);border:1px solid #f0b42945;border-radius:18px;width:100%;max-width:440px;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(240,180,41,.2),0 30px 80px rgba(0,0,0,.9);}
.pop-topbar{height:3px;background:linear-gradient(90deg,var(--g),#fff8,#7c3aed,var(--g));background-size:200%;animation:gmv 3s linear infinite;}

/* ADMIN VIEW */
#adm-view{display:none;position:fixed;inset:0;background:#111120;z-index:500;overflow-y:auto;}
#adm-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#181828;border-bottom:1px solid #f0b42930;position:sticky;top:0;z-index:200;}
.adm-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--g);}
.adm-logo span{color:#707090;font-size:11px;font-family:'Inter',sans-serif;margin-left:6px;}
.btn-back{background:#f0b42918;border:1px solid #f0b42940;color:var(--g);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.adm-body{display:flex;min-height:calc(100vh - 55px);}
.adm-side{width:210px;flex-shrink:0;background:#161626;border-right:1px solid #2a2a40;position:sticky;top:55px;height:calc(100vh - 55px);overflow-y:auto;padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
.adm-cont{flex:1;padding:22px;}
.stab{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:9px;font-size:13px;color:#8080a0;cursor:pointer;border:1px solid transparent;background:transparent;width:100%;text-align:left;font-weight:500;}
.stab:hover{background:#ffffff10;color:#e0e0f8;}
.stab.on{background:#f0b42915;border-color:#f0b42935;color:var(--g);font-weight:600;}
.s-sec{font-size:9px;color:#404060;letter-spacing:2px;text-transform:uppercase;padding:10px 13px 5px;font-weight:600;}
.s-badge{background:var(--g);color:#000;border-radius:10px;padding:1px 7px;font-size:9px;font-weight:700;margin-left:auto;}
.apnl{display:none;}
.apnl.on{display:block;}
.ac{background:#1a1a2e;border:1px solid #2e2e48;border-radius:12px;padding:20px;margin-bottom:14px;}
.ac-t{font-size:11px;color:var(--g);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:700;flex-wrap:wrap;}
.ab{background:#f0b42920;border:1px solid #f0b42940;border-radius:8px;padding:2px 9px;font-size:10px;color:var(--g);font-weight:600;}
.ai{width:100%;background:#1e1e30;border:1px solid #30304a;border-radius:8px;padding:10px 12px;color:#e0e0f0;font-size:13px;outline:none;}
.al{font-size:11px;color:#8080a0;margin-bottom:5px;display:block;font-weight:500;}
.af{margin-bottom:12px;}
.ag2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:767px){.ag2{grid-template-columns:1fr;}}
.trow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:9px;background:#1a1a28;border:1px solid #2a2a40;margin-bottom:8px;}

/* TOGGLE CONFIG */
.tgl{position:relative;width:40px;height:22px;flex-shrink:0;display:inline-block;}
.tgl input{opacity:0;width:0;height:0;}
.tsl{position:absolute;inset:0;background:#2a2a40;border-radius:11px;transition:.22s;cursor:pointer;border:1px solid #3a3a55;}
.tsl::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#606080;border-radius:50%;transition:.22s;}
.tgl input:checked+.tsl{background:var(--g);border-color:var(--g);}
.tgl input:checked+.tsl::before{transform:translateX(18px);background:#000;}

.bp{background:var(--g);border:none;color:#000;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.bs{background:transparent;border:1px solid #2a2a40;color:#b0b0d0;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.sp-row{background:#1e1e30;border:1px solid #30304a;border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.sp-ai{width:50px;height:50px;border-radius:7px;object-fit:cover;background:#2a2a40;flex-shrink:0;}
.sp-inf{flex:1;min-width:0;}
.sp-nm{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;}
.sp-bn{font-size:11px;color:#7070a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.efgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px;}
.efopt{background:#1a1a28;border:1px solid #2a2a40;border-radius:7px;padding:7px 4px;text-align:center;cursor:pointer;font-size:10px;color:#8080a0;}
.efopt.on{border-color:var(--g);background:#f0b42915;color:var(--g);font-weight:600;}
.tgpick{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
.tgbtn{background:#1a1a28;border:1px solid #2a2a40;border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;color:#8080a0;}
.tgbtn.on{border-color:var(--g);color:var(--g);}
.adm-mtabs{display:none;background:#0a0a12;border-bottom:1px solid #1a1a28;overflow-x:auto;position:sticky;top:55px;z-index:190;}
.mtab{padding:11px 14px;font-size:12px;color:#7070a0;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.mtab.on{color:var(--g);border-bottom-color:var(--g);}
@media(max-width:767px){.adm-side{display:none;}.adm-mtabs{display:flex;}.adm-cont{padding:12px;}.adm-body{flex-direction:column;}}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(14px);background:#22c55e;color:#000;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

    </div>
    <button class="mbtn" id="btn-esp-save-submit">Degisiklikleri Kaydet</button>
  </div>

<div id="toast"></div>

<script>
"use strict";

// DATA & STATE[cite: 2]
var AU = "admin", AP = "slotmaster2026";
var sponsors = [
  {id:1,name:'CASIBOM',bonus:'%100 Hosgeldin 1.000 TL',link:'https://google.com',img:'https://abidin11.com/uploads/sponsors/img_69d9987b9d9bf6.55381307.png',active:true},
  {id:2,name:'MARSBAHIS',bonus:'250 TL Min. Yatirim',link:'https://google.com',img:'https://abidin11.com/uploads/sponsors/sponsor_20260624_044446_065a2b39.png',active:true}
];
var isLogoImgMode = false;
var systemBannerActive = true;
var systemBannerUrl = "";

function G(id){return document.getElementById(id);}
function toast(m){var t=G('toast');if(!t)return;t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ROUTING MANTIĞI (/admin Kontrolü)[cite: 2]
function checkRouting() {
  if (window.location.hash === '#admin' || window.location.pathname.indexOf('/admin') !== -1) {
    if (sessionStorage.getItem('sm_admin_authed') === '1') {
      showAdminPanel();
    } else {
      openOv('admin-login');
    }
  } else {
    hideAdminPanel();
  }
}

window.addEventListener('hashchange', checkRouting);
window.addEventListener('load', function() {
  checkRouting();
  renderSponsors();
});

// MODAL CONTROLS[cite: 2]
function openOv(id){var el=G('ov-'+id);if(el)el.classList.add('open');}
function closeOv(id){var el=G('ov-'+id);if(el)el.classList.remove('open');}

// INTERACTION HANDLERS[cite: 2]
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('ov')) {
    e.target.classList.remove('open');
  }
  if (e.target.hasAttribute('data-close')) {
    closeOv(e.target.getAttribute('data-close'));
  }
  var tab = e.target.closest('[data-p]');
  if (tab && (tab.classList.contains('stab') || tab.classList.contains('mtab'))) {
    switchTab(tab.getAttribute('data-p'));
  }
  if (e.target.id === 'hbg-btn') {
    G('ndrop').classList.toggle('open');
  }
});

function switchTab(panelId) {
  document.querySelectorAll('.stab, .mtab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.apnl').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('[data-p="'+panelId+'"]').forEach(function(t){t.classList.add('on');});
  var pEl = G(panelId); if(pEl) pEl.classList.add('on');
}

// ADMIN CORE FUNCTIONS[cite: 2]
function showAdminPanel() {
  G('site-view').style.display = 'none';
  G('fbwrap').style.display = 'none';
  G('adm-view').style.display = 'block';
  closeOv('admin-login');
  renderAdminSponsors();
  
  // Setup config views[cite: 2]
  G('gif-tog').checked = systemBannerActive;
  G('gif-url').value = systemBannerUrl;
}

function hideAdminPanel() {
  G('adm-view').style.display = 'none';
  G('site-view').style.display = 'block';
  G('fbwrap').style.display = 'flex';
}

// LOGO FILE TO BASE64 CONVERTERS[cite: 2]
function bindFileToInput(fileInputId, inputUrlId, imgPreviewId) {
  var fileEl = G(fileInputId);
  if (!fileEl) return;
  fileEl.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      G(inputUrlId).value = evt.target.result;
      if (imgPreviewId) {
        G(imgPreviewId).src = evt.target.result;
        G(imgPreviewId).style.display = 'block';
      }
      toast('Resim basariyla yuklendi!');
    };
    reader.readAsDataURL(file);
  };
}

bindFileToInput('logo-file', 'logo-url-inp', 'logo-prev-img');
bindFileToInput('nsp-file', 'nsp-img', 'nsp-prev');
bindFileToInput('esp-file', 'esp-img', 'esp-prev');

G('btn-logo-file-trigger').onclick = function(){ G('logo-file').click(); };
G('btn-nsp-file-trigger').onclick = function(){ G('nsp-file').click(); };
G('btn-esp-file-trigger').onclick = function(){ G('esp-file').click(); };

// LOGO MODAL MODE BUTTONS[cite: 2]
G('btn-logo-mode-txt').onclick = function() { isLogoImgMode = false; toast('Yazi modu secildi.'); };
G('btn-logo-mode-img').onclick = function() { isLogoImgMode = true; toast('Gorsel modu secildi.'); };

// ADMIN LOGIN SUBMISSION[cite: 2]
G('btn-admin-login-submit').onclick = function() {
  var u = G('admin-login-u').value;
  var p = G('admin-login-p').value;
  if (u === AU && p === AP) {
    sessionStorage.setItem('sm_admin_authed', '1');
    showAdminPanel();
  } else {
    G('admin-login-err').textContent = "Yetkisiz Giriş Detayları!";
    G('admin-login-err').style.display = 'block';
  }
};

G('btn-adm-back').onclick = function() {
  window.location.hash = '';
  hideAdminPanel();
};

// RENDER FRONTEND SPONSORS[cite: 2]
function renderSponsors() {
  var grid = G('sp-grid');
  if (!grid) return;
  grid.innerHTML = '';
  sponsors.forEach(function(sp) {
    if (!sp.active) return;
    var card = document.createElement('div');
    card.className = 'spcef-glow spc';
    card.innerHTML = '<div class="spc-topbar"></div>' +
                     '<div class="spc-logo"><img class="spc-img" src="'+sp.img+'"></div>' +
                     '<div class="spc-body">' +
                       '<div class="spc-bonus">'+sp.bonus+'</div>' +
                       '<button class="spc-btn" onclick="window.open(\''+sp.link+'\', \'_blank\')">GIT</button>' +
                     '</div>';
    grid.appendChild(card);
  });
}

// RENDER ADMIN SPONSOR LIST[cite: 2]
function renderAdminSponsors() {
  var list = G('sp-adm-list');
  if (!list) return;
  list.innerHTML = '';
  sponsors.forEach(function(sp) {
    var row = document.createElement('div');
    row.className = 'sp-row';
    row.innerHTML = '<img class="sp-ai" src="'+sp.img+'">' +
                     '<div class="sp-inf"><div class="sp-nm">'+sp.name+'</div><div class="sp-bn">'+sp.bonus+'</div></div>' +
                     '<div style="font-size:11px;color:'+(sp.active?'#22c55e':'#ef4444')+'">'+(sp.active?'Aktif':'Pasif')+'</div>' +
                     '<button class="bs" onclick="openEditSponsor('+sp.id+')">Duzenle</button>';
    list.appendChild(row);
  });
}

// SPONSOR SAVE & ACTIONS[cite: 2]
G('btn-sp-add').onclick = function() { openOv('sp-add'); };

G('btn-sp-add-save').onclick = function() {
  var name = G('nsp-name').value;
  var link = G('nsp-link').value;
  var bonus = G('nsp-bonus').value;
  var img = G('nsp-img').value;
  if(!name || !link) { toast('Isim ve Link zorunludur'); return; }
  
  var newSp = {
    id: sponsors.length + 1,
    name: name,
    link: link,
    bonus: bonus || "%100 Firsat",
    img: img || "https://abidin11.com/uploads/sponsors/img_69d9987b9d9bf6.55381307.png",
    active: true
  };
  sponsors.push(newSp);
  closeOv('sp-add');
  renderAdminSponsors();
  renderSponsors();
  toast('Yeni sponsor eklendi');
};

window.openEditSponsor = function(id) {
  var sp = sponsors.find(function(item){ return item.id === id; });
  if(!sp) return;
  G('esp-id').value = sp.id;
  G('esp-name').value = sp.name;
  G('esp-link').value = sp.link;
  G('esp-bonus').value = sp.bonus;
  G('esp-img').value = sp.img;
  G('esp-prev').src = sp.img;
  G('esp-active-tog').checked = sp.active;
  openOv('sp-edit');
};

G('btn-esp-save-submit').onclick = function() {
  var id = parseInt(G('esp-id').value);
  var sp = sponsors.find(function(item){ return item.id === id; });
  if(!sp) return;
  
  sp.name = G('esp-name').value;
  sp.link = G('esp-link').value;
  sp.bonus = G('esp-bonus').value;
  sp.img = G('esp-img').value;
  sp.active = G('esp-active-tog').checked; // Açık kapalı state onarımı[cite: 2]
  
  closeOv('sp-edit');
  renderAdminSponsors();
  renderSponsors();
  toast('Sponsor guncellendi');
};

// GLOBAL BANNER & LOGO FINALIZE SAVE[cite: 2]
G('btn-banner-save').onclick = function() {
  systemBannerActive = G('gif-tog').checked;
  systemBannerUrl = G('gif-url').value;
  
  var logoImg = G('nlogo-img');
  var logoTxt = G('nlogo-txt');
  var logoInpVal = G('logo-url-inp').value;
  
  if (isLogoImgMode && logoInpVal) {
    logoImg.src = logoInpVal;
    logoImg.style.display = 'block';
    logoTxt.style.display = 'none';
  } else {
    logoImg.style.display = 'none';
    logoTxt.style.display = 'block';
  }
  
  var bannerDiv = G('gif-banner');
  if (systemBannerActive && systemBannerUrl) {
    G('gif-img').src = systemBannerUrl;
    bannerDiv.style.display = 'block';
  } else {
    bannerDiv.style.display = 'none';
  }
  
  toast('Ayarlar ve Logo Durumlari Basariyla Kaydedildi!');
};
</script>
</body>
</html>
